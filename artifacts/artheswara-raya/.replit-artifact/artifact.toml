kind = "web"
previewPath = "/"
title = "Artheswara Raya"
version = "1.0.0"
id = "artifacts/artheswara-raya"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22152

[services.development]
run = "pnpm --filter @workspace/artheswara-raya run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/artheswara-raya", "run", "build" ]
publicDir = "artifacts/artheswara-raya/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22152"
BASE_PATH = "/"
